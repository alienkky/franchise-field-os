[phases.setup]
nixPkgs = ["nodejs_22", "openssl"]

[phases.install]
cmds = [
  "cd client && npm install --no-audit --no-fund",
  "cd server && npm install --no-audit --no-fund",
  "cd server && npx prisma generate"
]

[phases.build]
cmds = ["cd client && npm run build"]

[start]
cmd = "cd server && (node prisma/pre-migrate.js || echo 'Pre-migrate skipped') && npx prisma db push --accept-data-loss --skip-generate && (node prisma/seed.js || echo 'Seed skipped') && npm start"
